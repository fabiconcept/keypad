name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build Release
        run: |
          xcodebuild -project KeyLoom.xcodeproj \
            -scheme KeyLoom \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Sign App
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PWD: ${{ secrets.APPLE_CERTIFICATE_PWD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PWD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          codesign --force --deep --options runtime \
            --timestamp \
            --sign "Developer ID Application" \
            --keychain "$KEYCHAIN_PATH" \
            build/Build/Products/Release/KeyLoom.app
          rm -f certificate.p12
          echo "App signed successfully"

      - name: Create DMG
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" build/Build/Products/Release/KeyLoom.app/Contents/Info.plist)

          WINDOW_X=200; WINDOW_Y=120; WINDOW_W=600; WINDOW_H=400
          ICON_SIZE=90
          APP_X=150; APP_Y=180
          LINK_X=420; LINK_Y=180

          mkdir -p build/DMG
          cp -R build/Build/Products/Release/KeyLoom.app build/DMG/
          ln -s /Applications build/DMG/Applications

          hdiutil create -volname "KeyLoom" -srcfolder build/DMG \
            -ov -format UDRW "KeyLoom-tmp.dmg"
          rm -rf build/DMG

          hdiutil attach "KeyLoom-tmp.dmg" -readwrite -noverify -noautoopen -quiet

          osascript << APPLESCRIPT
tell application "Finder"
    tell disk "KeyLoom"
        open
        set current view of container window to icon view
        set toolbar visible of container window to false
        set statusbar visible of container window to false
        set the bounds of container window to {$WINDOW_X, $WINDOW_Y, $WINDOW_X + $WINDOW_W, $WINDOW_Y + $WINDOW_H}
        set viewOptions to the icon view options of container window
        set arrangement of viewOptions to not arranged
        set icon size of viewOptions to $ICON_SIZE
        set background picture of viewOptions to POSIX file "$GITHUB_WORKSPACE/scripts/dmg-background.png"
        set position of item "KeyLoom.app" of container window to {$APP_X, $APP_Y}
        set position of item "Applications" of container window to {$LINK_X, $LINK_Y}
        close
        open
        update without registering applications
        delay 2
        close
    end tell
end tell
APPLESCRIPT

          sync
          hdiutil detach "/Volumes/KeyLoom" -quiet 2>/dev/null || hdiutil detach "/Volumes/KeyLoom" -force -quiet

          hdiutil convert "KeyLoom-tmp.dmg" -format UDZO -imagekey zlib-level=9 -o "KeyLoom-$VERSION.dmg"
          rm -f "KeyLoom-tmp.dmg"
          echo "DMG created: KeyLoom-$VERSION.dmg"

      - name: Notarize
        if: env.APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          AC_PASSWORD: ${{ secrets.AC_PASSWORD }}
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" build/Build/Products/Release/KeyLoom.app/Contents/Info.plist)
          xcrun notarytool submit "KeyLoom-$VERSION.dmg" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$AC_PASSWORD" \
            --wait
          xcrun stapler staple build/Build/Products/Release/KeyLoom.app
          echo "Notarization complete"

      - name: Upload Release Asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" build/Build/Products/Release/KeyLoom.app/Contents/Info.plist)
          gh release create "${{ github.ref_name }}" \
            --title "KeyLoom $VERSION" \
            --generate-notes \
            "KeyLoom-$VERSION.dmg"
