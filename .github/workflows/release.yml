name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build Release
        run: |
          xcodebuild -project KeyLoom.xcodeproj \
            -scheme KeyLoom \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Sign App
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PWD: ${{ secrets.APPLE_CERTIFICATE_PWD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PWD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          codesign --force --deep --options runtime \
            --timestamp \
            --sign "Developer ID Application" \
            --keychain "$KEYCHAIN_PATH" \
            build/Build/Products/Release/KeyLoom.app
          rm -f certificate.p12
          echo "App signed successfully"

      - name: Create DMG
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" build/Build/Products/Release/KeyLoom.app/Contents/Info.plist)
          mkdir -p build/DMG
          cp -R build/Build/Products/Release/KeyLoom.app build/DMG/
          ln -s /Applications build/DMG/Applications
          hdiutil create -volname "KeyLoom" -srcfolder build/DMG -ov -format UDZO "KeyLoom-$VERSION.dmg"
          rm -rf build/DMG
          echo "DMG created: KeyLoom-$VERSION.dmg"

      - name: Notarize
        if: env.APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          AC_PASSWORD: ${{ secrets.AC_PASSWORD }}
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" build/Build/Products/Release/KeyLoom.app/Contents/Info.plist)
          xcrun notarytool submit "KeyLoom-$VERSION.dmg" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$AC_PASSWORD" \
            --wait
          xcrun stapler staple build/Build/Products/Release/KeyLoom.app
          echo "Notarization complete"

      - name: Upload Release Asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" build/Build/Products/Release/KeyLoom.app/Contents/Info.plist)
          gh release create "${{ github.ref_name }}" \
            --title "KeyLoom $VERSION" \
            --generate-notes \
            "KeyLoom-$VERSION.dmg"
