disabled_rules:
  - identifier_name
  - multiple_closures_with_trailing_closure
  - trailing_whitespace
  - comma
  - redundant_discardable_let
  - for_where
  - large_tuple
  - redundant_string_enum_value
  - function_parameter_count
  - closure_spacing
  - opening_brace

opt_in_rules: []

line_length:
  warning: 300
  error: 400
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 500
  error: 800

file_length:
  warning: 500
  error: 800

excluded:
  - build
  - DerivedData
  - .build
